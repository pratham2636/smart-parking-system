{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #1d2671, #c33764);
        height: 100vh;
    }

    .booking-box {
        max-width: 450px;
        margin: auto;
        margin-top: 6%;
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .form-control {
        border-radius: 10px;
    }

    .btn {
        border-radius: 10px;
    }
</style>

<div class="booking-box">

    <h3 class="text-center mb-4">🅿️ Book Slot</h3>

    <!-- 🔥 IMPORTANT CHANGE -->
    <form method="post" action="/payment/{{ pid }}">

        <label class="mb-1">Start Time</label>
        <input type="datetime-local" name="start" class="form-control mb-3" required>

        <label class="mb-1">End Time</label>
        <input type="datetime-local" name="end" class="form-control mb-3" required>

        <!-- 💰 Pricing info -->
        <p class="text-muted text-center">
            💰 ₹10 per hour (charged per started hour)
        </p>

        <button type="submit" class="btn btn-success w-100">
            Continue to Payment
        </button>

    </form>

</div>

{% endblock %}
