{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #1d2671, #c33764);
        height: 100vh;
    }

    .parking-box {
        max-width: 450px;
        margin: auto;
        margin-top: 6%;
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .form-control {
        border-radius: 10px;
    }

    .btn {
        border-radius: 10px;
    }
</style>

<div class="parking-box">

    <h3 class="text-center mb-4">➕ Add Parking</h3>

    <form method="post">

        <input name="name" class="form-control mb-3" placeholder="Parking Name" required>

        <input name="location" class="form-control mb-3" placeholder="Location" required>

        <input name="total" type="number" class="form-control mb-3" placeholder="Total Slots" required>

        <input name="reserved" type="number" class="form-control mb-3" placeholder="Reserved Slots" required>

        <button type="submit" class="btn btn-primary w-100">
            Add Parking
        </button>

    </form>

</div>

{% endblock %}
