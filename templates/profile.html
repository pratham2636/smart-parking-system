<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1d2671, #c33764);
            height: 100vh;
        }

        .profile-box {
            max-width: 450px;
            margin: auto;
            margin-top: 6%;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            position: relative; /* 🔥 IMPORTANT */
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #0d6efd;
            color: white;
            font-size: 30px;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .info {
            margin-top: 15px;
            font-size: 16px;
            text-align: left;
        }

        .info p {
            margin: 6px 0;
        }

        .btn-custom {
            border-radius: 10px;
        }

        /* 🔥 EDIT BUTTON STYLE */
        .edit-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .edit-btn:hover {
            background: #0b5ed7;
        }
    </style>
</head>

<body>

<div class="profile-box">

    <!-- 🔥 TOP RIGHT EDIT ICON -->
    <a href="/edit_profile" class="edit-btn">
        ✏️
    </a>

    <!-- AVATAR -->
    <div class="avatar">
        {{ user.name[0] }}
    </div>

    <h3 class="mt-3">{{ user.name }}</h3>

    <span class="badge bg-info">{{ user.role }}</span>

    <hr>

    <!-- ACCOUNT INFO -->
    <div class="info">

        <p><b>Email:</b> {{ user.email }}</p>

        {% if user.phone %}
        <p><b>Phone:</b> {{ user.phone }}</p>
        {% else %}
        <p><b>Phone:</b> Not added</p>
        {% endif %}

        <p><b>Joined:</b> {{ user.created_at }}</p>

    </div>

    <!-- ACTION BUTTONS -->
    <div class="mt-4">

        <a href="/change_password" class="btn btn-warning w-100 mb-2 btn-custom">
            🔒 Change Password
        </a>

        <a href="/parkings" class="btn btn-dark w-100 btn-custom">
            ⬅ Back
        </a>

    </div>

</div>

</body>
</html>
