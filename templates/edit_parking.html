<!DOCTYPE html>
<html>
<head>
    <title>Edit Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3>Edit Parking</h3>

        <form method="POST">

            <input type="number" name="total" value="{{ parking.total_slots }}"
                   class="form-control mb-3" placeholder="Total Slots" required>

            <input type="number" name="reserved" value="{{ parking.reserved_slots }}"
                   class="form-control mb-3" placeholder="Reserved Slots" required>

            <button class="btn btn-primary w-100">Update</button>

        </form>

    </div>
</div>

</body>
</html>
