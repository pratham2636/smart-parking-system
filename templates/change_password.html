<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3>Change Password</h3>

        <form method="POST">

            <input type="password" name="old" placeholder="Old Password" class="form-control mb-3" required>

            <input type="password" name="new" placeholder="New Password" class="form-control mb-3" required>

            <button class="btn btn-warning w-100">Change Password</button>

        </form>

    </div>
</div>

</body>
</html>
