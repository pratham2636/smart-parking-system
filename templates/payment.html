{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #1d2671, #c33764);
        height: 100vh;
    }

    .payment-box {
        max-width: 450px;
        margin: auto;
        margin-top: 6%;
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .form-check {
        margin-bottom: 10px;
    }

    .btn {
        border-radius: 10px;
    }
</style>

<div class="payment-box text-center">

    <h3>💳 Payment</h3>

    <!-- 💰 Amount -->
    <h4 class="mt-3 text-success">₹{{ amount }}</h4>

    <p class="text-muted">
        Pay securely using your preferred method
    </p>

    <hr>

    <!-- PAYMENT FORM -->
    <form method="post" action="/confirm_booking/{{ pid }}">

        <!-- hidden data -->
        <input type="hidden" name="start" value="{{ start }}">
        <input type="hidden" name="end" value="{{ end }}">
        <input type="hidden" name="amount" value="{{ amount }}">

        <!-- 🔽 Payment options -->
        <div class="text-start">

            <h6 class="mb-2">Select Payment Method</h6>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="method" value="UPI" required>
                <label class="form-check-label">📱 UPI (GPay / PhonePe)</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="method" value="Card">
                <label class="form-check-label">💳 Debit / Credit Card</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="method" value="NetBanking">
                <label class="form-check-label">🏦 Net Banking</label>
            </div>

        </div>

        <!-- PAY BUTTON -->
        <button class="btn btn-success w-100 mt-4">
            Pay ₹{{ amount }}
        </button>

    </form>

</div>

{% endblock %}
